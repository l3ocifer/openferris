# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
unmaintained = "workspace"
unsound = "all"
yanked = "warn"
ignore = [
    # rsa timing side-channel — no fix available, only affects sqlx-mysql which we don't use
    "RUSTSEC-2023-0071",
]

[licenses]
unused-allowed-license = "allow"
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

# BUSL-1.1 is used by ferris-coordinator (our own crate)
exceptions = [
    { allow = ["BUSL-1.1"], crate = "ferris-coordinator" },
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
