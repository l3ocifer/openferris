[agent]
name = "ferris-agent"
data_dir = "~/.ferris"

[mcp]
transport = "stdio"
port = 9420

[memory]
max_entries = 1000

[storage]
max_mb = 100

[tasks]
max_scheduled = 10

[network]
coordinator_url = "https://api.openferris.dev"
heartbeat_interval_secs = 30
contribute_gpu = true
contribute_storage = true
contribute_cpu = true
contribute_percent = 50

[inference]
ollama_url = "http://localhost:11434"
max_concurrent_requests = 4
