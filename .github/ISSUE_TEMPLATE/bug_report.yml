name: Bug report
description: Report a reproducible bug.
title: "[bug]: "
labels: ["type/bug", "needs/triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for filing a bug. Please include enough detail to reproduce.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps, in order.
      placeholder: |
        1. Run command ...
        2. Edit file ...
        3. Observe error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / logs
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: OpenFerris commit/version
      placeholder: main @ <sha>
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS / Linux / Windows
