name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build ferris (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }} --bin ferris

      - name: Build ferris-coordinator (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }} --bin ferris-coordinator

      - name: Build ferris (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} --bin ferris
        env:
          CROSS_CONTAINER_OPTS: "--env OPENSSL_STATIC=1"

      - name: Build ferris-coordinator (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} --bin ferris-coordinator
        env:
          CROSS_CONTAINER_OPTS: "--env OPENSSL_STATIC=1"

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/ferris dist/ferris-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/ferris-coordinator dist/ferris-coordinator-${{ matrix.target }}
          chmod +x dist/ferris-${{ matrix.target }}
          chmod +x dist/ferris-coordinator-${{ matrix.target }}

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\ferris.exe dist\ferris-${{ matrix.target }}.exe
          copy target\${{ matrix.target }}\release\ferris-coordinator.exe dist\ferris-coordinator-${{ matrix.target }}.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
